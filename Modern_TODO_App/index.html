<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M12 3l1.912 5.813a2 2 0 001.275 1.275L21 12l-5.813 1.912a2 2 0 00-1.275 1.275L12 21l-1.912-5.813a2 2 0 00-1.275-1.275L3 12l5.813-1.912a2 2 0 001.275-1.275L12 3z" />
          </svg>
        </div>
        <div class="logo-text">
          <h1>TaskFlow</h1>
          <p>Organize your day</p>
        </div>
      </div>
      <div class="current-time" id="currentTime"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Stats Cards -->
    <section class="stats-grid">
      <div class="stat-card animate-fade-in">
        <div class="stat-icon stat-icon-total">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="statTotal">0</span>
          <span class="stat-label">Total Tasks</span>
        </div>
      </div>
      <div class="stat-card animate-fade-in" style="animation-delay: 100ms">
        <div class="stat-icon stat-icon-pending">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12,6 12,12 16,14" />
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="statPending">0</span>
          <span class="stat-label">Pending</span>
        </div>
      </div>
      <div class="stat-card animate-fade-in" style="animation-delay: 200ms">
        <div class="stat-icon stat-icon-progress">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20V10M18 20V4M6 20v-4" />
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="statInProgress">0</span>
          <span class="stat-label">In Progress</span>
        </div>
      </div>
      <div class="stat-card animate-fade-in" style="animation-delay: 300ms">
        <div class="stat-icon stat-icon-completed">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
            <polyline points="22,4 12,14.01 9,11.01" />
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="statCompleted">0</span>
          <span class="stat-label">Completed</span>
        </div>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls">
      <div class="search-box">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search tasks..." class="search-input" />
      </div>
      <div class="filters">
        <div class="select-wrapper">
          <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <polygon points="22,3 2,3 10,12.46 10,19 14,21 14,12.46" />
          </svg>
          <select id="filterStatus" class="filter-select">
            <option value="all">All Status</option>
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <select id="filterPriority" class="filter-select">
          <option value="all">All Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <button class="btn btn-primary" id="addTaskBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <span>Add Task</span>
        </button>
      </div>
    </section>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      <span id="errorText"></span>
      <button class="error-close" id="errorClose">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <!-- Tasks Container -->
    <section class="tasks-container" id="tasksContainer">
      <!-- Loading State -->
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Loading tasks...</p>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display: none">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
            <polyline points="22,4 12,14.01 9,11.01" />
          </svg>
        </div>
        <h3 id="emptyTitle">No tasks yet</h3>
        <p id="emptyMessage">Create your first task to get started</p>
        <button class="btn btn-primary" id="emptyAddBtn" style="display: none">Create Task</button>
      </div>

      <!-- Tasks List -->
      <div class="tasks-list" id="tasksList"></div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">New Task</h2>
        <button class="modal-close" id="modalClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <form class="modal-form" id="taskForm">
        <div class="form-group">
          <label class="form-label" for="taskTitle">Title *</label>
          <input type="text" id="taskTitle" class="form-input" placeholder="What needs to be done?" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="taskLocation">Location</label>
          <input type="text" id="taskLocation" class="form-input" placeholder="Where does this need to happen?" />
        </div>
        <div class="form-group">
          <label class="form-label" for="taskDescription">Description</label>
          <textarea id="taskDescription" class="form-textarea" rows="3" placeholder="Add more details..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="taskStatus">Status</label>
            <select id="taskStatus" class="form-select">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="taskPriority">Priority</label>
            <select id="taskPriority" class="form-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="taskDueDate">Due Date</label>
          <input type="date" id="taskDueDate" class="form-input" />
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span class="btn-text">Create Task</span>
            <span class="btn-loading" style="display: none">
              <span class="btn-spinner"></span>
              Saving...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p > &copy;<span id="year"></span> Todo App Developed by <b>Tayyab Abdul Hannan</b> made with <span>&#128151</span></p>
  </footer>

  <script type="module" src="script.js"></script>
</body>

</html>
